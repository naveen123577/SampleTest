<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I'm Sorry ❤️</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #ffe6eb;
      text-align: center;
      overflow: hidden;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #yesBtn {
      background: #4CAF50;
      color: white;
    }

    #noBtn {
      background: #f44336;
      color: white;
    }

    #message {
      margin-top: 15px;
      color: #e91e63;
      font-weight: bold;
      min-height: 20px;
    }
  </style>
</head>
<body>

  <div class="box" id="content">
    <h2>Please accept my apology ❤️</h2>

    <button id="yesBtn" onclick="acceptApology()">Yes</button>
    <button id="noBtn" onmouseover="moveNoButton()">
      No
    </button>

    <div id="message"></div>
  </div>

  <script>
    function acceptApology() {
      document.getElementById("content").innerHTML =
        "<h1>THANKS ❤️</h1><h3>You made my day! 😊</h3>";
    }

    function moveNoButton() {
      const btn = document.getElementById("noBtn");
      const message = document.getElementById("message");

      message.innerHTML = "Not Possible 😄";

      const maxX = window.innerWidth - btn.offsetWidth - 20;
      const maxY = window.innerHeight - btn.offsetHeight - 20;

      const randomX = Math.floor(Math.random() * maxX);
      const randomY = Math.floor(Math.random() * maxY);

      btn.style.position = "absolute";
      btn.style.left = randomX + "px";
      btn.style.top = randomY + "px";
    }
  </script>

</body>
</html>
